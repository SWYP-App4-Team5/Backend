spring:
  application:
    name: server
  profiles:
    default: local
  config:
    import:
      - optional:config/flyway.yml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  cloud:
    aws:
      region:
        static: ap-northeast-2
      credentials:
        access-key: ${S3_ACCESS_KEY}
        secret-key: ${S3_SECRET_KEY}
      s3:
        enabled: true
oauth:
  kakao:
    user-info-url: https://kapi.kakao.com/v2/user/me
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    token-url: https://kauth.kakao.com/oauth/token
  google:
    user-info-url: https://www.googleapis.com/oauth2/v2/userinfo
jwt:
  expiration: 3600000
  refresh-expiration: 2592000000
  secret: ${JWT_SECRET}
app:
  version: local
  env: local
auth:
  refresh-token-expires-days: 30
  refresh-token-re-issue-threshold-days: 2
storage:
  bucket: jjanpot-s3-bucket
  base-url: https://jjanpot-s3-bucket.s3.ap-northeast-2.amazonaws.com

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

