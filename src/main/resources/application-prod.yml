spring:
  application:
    name: server
  config:
    import:
      - optional:config/flyway.yml
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
app:
  version: prod
  env: prod
cors:
  allowed-origins:
    - https://jjanpot.shop
    - http://localhost:8080

custom:
  encryption:
    key: ${ENCRYPT_KEY}
  fcm:
    dry: false # 테스트 발송여부. true면 보내지 않음
    partition-size: 500
    key-path: ${KEY_PATH}
